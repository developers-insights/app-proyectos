name: Deploy a Render

# Dispara el deploy de proyectosapp en Render en cada push a main. Sustituye a la
# conexion nativa GitHub App <-> Render (Render solo permite UNA cuenta de GitHub
# conectada por workspace; este repo vive en una cuenta distinta a la ya conectada).
#
# Ojo con esta secuencia (no simplificar a un solo POST /deploys):
# En modo "Public Git Repository", Render NO refresca solo el ref de la rama al
# recibir un POST /deploys vacio -- se queda pegado al ultimo commit que conocia
# (verificado: 3 pushes seguidos deployaron el commit viejo sin este paso). Hay
# que forzar el resync con un PATCH al mismo repo (nudge) ANTES de pedir el
# deploy, y pedirlo con el commitId exacto para asegurar que toma el correcto.
#
# Ademas, el POST devuelve el deploy id: hacemos polling del estado hasta un
# estado terminal e imprimimos el commit REAL que Render checkouteo, para no
# quedarnos con un "success" del workflow mientras Render deploya codigo viejo o
# el build falla en silencio.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE_ID: srv-d8u0gspo3t8c73c5dn6g
    steps:
      - name: Listar deploys recientes de Render (read-only, sin crear nada)
        run: |
          set -uo pipefail
          AUTH="Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
          echo "commit de este push (HEAD): ${GITHUB_SHA}"
          echo "== ultimos 15 deploys en Render (mas nuevo primero) =="
          curl -sS "https://api.render.com/v1/services/${SERVICE_ID}/deploys?limit=15" -H "$AUTH" \
            | jq -r '.[] | .deploy | "\(.createdAt)  status=\(.status)  commit=\(.commit.id[0:8])  fin=\(.finishedAt // "-")  trigger=\(.trigger // "-")"'
